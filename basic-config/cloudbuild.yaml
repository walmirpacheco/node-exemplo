
steps:
  - name: gcr.io/cloud-builders/docker
    args:
    - build
    - -t
    - gcr.io/project-eed68c53-531e-44c6-adf/myimage:latest
    - .
    id: docker-build
  
  - name: gcr.io/cloud-builders/docker
    args:
    - push
    - gcr.io/project-eed68c53-531e-44c6-adf/myimage:latest
    id: docker-push
    waitFor:
    - docker-build
  
  - name: gcr.io/cloud-builders/gcloud
    args:
    - run
    - deploy
    - my-service
    - --image=gcr.io/project-eed68c53-531e-44c6-adf/myimage:latest
    - --platform=managed
    - --region=us-central1
    - --allow-unauthenticated
    - --memory=512Mi
    - --cpu=1
    - --port=8080
    - --quiet
    id: deploy-cloudrun
    waitFor:
    - docker-push
  
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
    - -c
    - |
      echo "========================================="
      echo "DEPLOY CONCLUIDO COM SUCESSO!"
      echo "========================================="
      gcloud run services describe my-service --region=us-central1 --format="value(status.url)"
      echo ""
      echo "========================================="
    id: final-info
    waitFor:
    - deploy-cloudrun
